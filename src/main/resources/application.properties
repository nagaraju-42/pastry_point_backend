# =====================================================
# BakeryQ — application.properties (PRODUCTION - POSTGRES)
# =====================================================

spring.application.name=bakeryq

# ── Server ───────────────────────────────────────────
server.port=${PORT:8080}

# ── PostgreSQL Database ──────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Connection Pool (HikariCP) ───────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ── JWT ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Email ────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Razorpay ─────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── App Config ───────────────────────────────────────
app.free-delivery-minimum=300
app.delivery-charge=40
app.shop-name=BakeryQ
app.shop-address=Near College Gate

# ── Logging ──────────────────────────────────────────
logging.level.com.bakeryq=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=WARN