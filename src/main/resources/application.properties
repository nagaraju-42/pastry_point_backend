# ─── Application ───────────────────────────────────────────────────────────────
spring.application.name=bakeryq

# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL Database ───────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ─── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlcnlxIGp3dCB0b2tlbiBzaWduaW5n}
jwt.expiration=86400000

# ─── Email ─────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:noreply@bakeryq.com}
spring.mail.password=${EMAIL_PASSWORD:dummy-not-used}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000

# ─── Razorpay ──────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ─── Business rules ────────────────────────────────────────────────────────────
app.free-delivery-minimum=300
app.delivery-charge=40
app.shop-name=${SHOP_NAME:BakeryQ}
app.shop-address=${SHOP_ADDRESS:Near College Gate}

# ─── Async / Scheduling ────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.bakeryq=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=WARN





