# =====================================================
# BakeryQ — application.properties (LOCAL DEV)
# =====================================================

spring.application.name=bakeryq

# ── Server ───────────────────────────────────────────
server.port=8080

# ── H2 Database (for local dev only) ─────────────────
spring.datasource.url=jdbc:h2:mem:bakeryqdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── H2 Console ───────────────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dummy-secret-key-for-dev}
jwt.expiration=86400000

# ── Email (safe defaults for dev) ─────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:noreply@bakeryq.com}
spring.mail.password=${EMAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Razorpay (test keys) ─────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_xxx}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy}

# ── App Config ───────────────────────────────────────
app.free-delivery-minimum=300
app.delivery-charge=40
app.shop-name=BakeryQ
app.shop-address=Near College Gate

# ── Logging ──────────────────────────────────────────
logging.level.com.bakeryq=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=WARN