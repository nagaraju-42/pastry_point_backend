# =====================================================
# BakeryQ — application-prod.properties (PRODUCTION)
# Used when deployed on Render
# =====================================================

# ── Application ───────────────────────────────────────
spring.application.name=bakeryq

# ── Server ───────────────────────────────────────────
server.port=${PORT:8080}

# ── PostgreSQL (Render) ──────────────────────────────
# Render provides DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Optional (only if you set manually in Render)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ──────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# 🔥 IMPORTANT: Prevents dialect error
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ── Connection Pool (Hikari) ─────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JWT ──────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Email ────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Razorpay ─────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── App Config ───────────────────────────────────────
app.free-delivery-minimum=300
app.delivery-charge=40
app.currency=INR
app.timezone=Asia/Kolkata
app.shop-name=${SHOP_NAME:BakeryQ}
app.shop-address=${SHOP_ADDRESS:Hyderabad}
app.frontend-url=${FRONTEND_URL}

# ── Disable Dev Tools ────────────────────────────────
spring.h2.console.enabled=false

# ── Logging ──────────────────────────────────────────
logging.level.com.bakeryq=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN