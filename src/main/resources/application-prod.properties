# =====================================================
# BakeryQ — application-prod.properties (PRODUCTION)
# Used when deployed on Render.
# All sensitive values come from Render Environment Variables.
# NEVER put real secrets in this file!
# =====================================================

# ── PostgreSQL Database (Render) ──────────────────
# Render provides DATABASE_URL automatically when you
# link a PostgreSQL database to your web service.
server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate (Production) ─────────────────
# "update" = keeps existing data, only adds new tables/columns
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jpa.open-in-view=false

# PostgreSQL connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ── JWT (Production) ──────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ── Email (Production) ────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Razorpay (Production) ─────────────────────────
# Switch to LIVE keys after going live (rzp_live_...)
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ── App (Production) ──────────────────────────────
app.free-delivery-minimum=300
app.delivery-charge=40
app.currency=INR
app.timezone=Asia/Kolkata
app.shop-name=${SHOP_NAME:BakeryQ}
app.shop-address=${SHOP_ADDRESS:Hyderabad}
app.frontend-url=${FRONTEND_URL}

# ── H2 Console — DISABLED in production ──────────
spring.h2.console.enabled=false

# ── Swagger — disabled in production (optional) ──
# Uncomment to hide API docs from public:
# springdoc.swagger-ui.enabled=false
# springdoc.api-docs.enabled=false

# ── Logging (Production) ─────────────────────────
logging.level.com.bakeryq=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
