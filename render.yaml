# =====================================================
# BakeryQ — render.yaml
# Defines ALL Render services in one file.
# Push to GitHub and Render auto-deploys everything.
# =====================================================

services:

  # ── Spring Boot Backend ──────────────────────────
  - type: web
    name: bakeryq-backend
    runtime: docker
    dockerfilePath: ./bakeryq-backend/Dockerfile
    dockerContext: ./bakeryq-backend
    plan: free                         # Free tier — upgrade to starter ($7/mo) for always-on
    healthCheckPath: /api/auth/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # These are set manually in Render Dashboard (sensitive values)
      - key: DATABASE_URL
        fromDatabase:
          name: bakeryq-db
          property: connectionString

      - key: DB_USERNAME
        fromDatabase:
          name: bakeryq-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: bakeryq-db
          property: password

      - key: JWT_SECRET
        generateValue: true            # Render auto-generates a secure random value!

      - key: EMAIL_USERNAME
        sync: false                    # You set this manually in Render Dashboard

      - key: EMAIL_PASSWORD
        sync: false

      - key: RAZORPAY_KEY_ID
        sync: false

      - key: RAZORPAY_KEY_SECRET
        sync: false

      - key: FRONTEND_URL
        value: https://bakeryq.vercel.app   # Update with your actual Vercel URL

      - key: SHOP_NAME
        value: BakeryQ

      - key: SHOP_ADDRESS
        value: Near College Gate, Hyderabad

  # ── PostgreSQL Database ──────────────────────────
databases:
  - name: bakeryq-db
    plan: free                         # Free for 90 days, then $7/month
    databaseName: bakeryq
    user: bakeryq_user
    region: singapore                  # Closest to India!
    ipAllowList: []                    # Allow all connections (backend accesses it internally)
